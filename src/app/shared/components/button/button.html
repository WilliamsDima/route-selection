<ng-template #content><ng-content /></ng-template>

@if (link()) {
  <a [class]="classes()" [routerLink]="link()">
    <ng-container [ngTemplateOutlet]="content" />
  </a>
} @else {
  <button [class]="classes()" [type]="type()" [disabled]="disabled()">
    <ng-container [ngTemplateOutlet]="content" />
  </button>
}
