@if (route(); as r) {
  <div class="result">
    <span class="result__name">{{ r.name }}</span>
    <span class="result__dist">{{ r.distKm }} км</span>
  </div>
} @else if (hasRoutes()) {
  @if (spinning()) {
    <app-lottie-player name="cats" class="hub-cats" />
  } @else {
    <span class="hint">Крутите!</span>
  }
} @else {
  <span class="hint">Нет маршрутов</span>
}
