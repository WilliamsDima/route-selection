<div class="roulette">
  <div class="roulette__wheel" [class.roulette__wheel--enlarged]="spinning() || selected()">
    <div class="roulette__pointer"></div>

    <div class="roulette__disc" [style.transform]="'rotate(' + rotation() + 'deg)'">
      <svg viewBox="0 0 100 100" class="roulette__svg" [attr.font-size]="fontSize()">
        @for (s of renderSegments(); track s.index) {
          <g appRouletteSegment [segment]="s"></g>
        }

        @if (activeSegment(); as s) {
          <g [attr.transform]="'translate(50 50) scale(' + scale + ') translate(-50 -50)'">
            <g appRouletteSegment [segment]="s"></g>
          </g>
        }
      </svg>
    </div>

    <div class="roulette__hub">
      @if (selected(); as route) {
        <app-route-map [gpxFile]="route.gpxFile" />
        <div class="roulette__caption">
          <span class="roulette__caption-name">{{ route.name }}</span>
          <span class="roulette__caption-dist">{{ route.distKm }} км</span>
        </div>
      } @else {
        <app-roulette-hub [spinning]="spinning()" [hasRoutes]="routes().length > 0" />
      }
    </div>

    @if (showCongrats()) {
      <app-lottie-player
        name="congratulations"
        [loop]="false"
        class="roulette__congrats"
        (complete)="onCongratsComplete()"
      />
    }
  </div>

  <label class="roulette__duration">
    <span class="roulette__duration-label">Время вращения: {{ spinDurationSec() }} с</span>
    <input
      type="range"
      class="roulette__duration-input"
      [min]="minSpinDurationSec"
      [max]="maxSpinDurationSec"
      [step]="1"
      [value]="spinDurationSec()"
      [disabled]="spinning()"
      (input)="onDurationInput($event)"
    />
  </label>

  <app-button (click)="spin()" [disabled]="spinning() || routes().length === 0">
    {{ spinning() ? 'Мяу...' : 'Мяу' }}
  </app-button>
</div>
