<div class="route-list">
  @for (route of routes(); track route.id) {
    <app-route-card
      [route]="route"
      [active]="route.id === activeId()"
      [disabled]="disabled()"
      (click)="disabled() ? null : select.emit(route)"
    />
  } @empty {
    <p class="route-list__empty">Маршрутов пока нет</p>
  }
</div>
